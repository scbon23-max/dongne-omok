<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>캐치마인드 그림판 스킨 미리보기</title>
<style>
  :root {
    color-scheme: dark;
    --navy: #0e2a3a;
    --navy-2: #16384a;
    --navy-3: #31576a;
    --paper: #ffffff;
    --wordbar: #f5f0e8;
    --ink: #173746;
    --muted: #9db2bc;
    --orange: #f3612a;
    --teal: #31c9b5;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-width: 320px;
    background: #081820;
    color: #eef6f8;
    font-family: Pretendard, "Noto Sans KR", system-ui, sans-serif;
  }
  button { font: inherit; }
  .page {
    width: min(1120px, calc(100% - 28px));
    margin: 0 auto;
    padding: 28px 0 48px;
  }
  .top {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 20px;
  }
  h1 { margin: 0 0 5px; font-size: clamp(22px, 4vw, 34px); }
  .top p { margin: 0; color: var(--muted); font-size: 14px; }
  .count {
    flex: 0 0 auto;
    padding: 7px 11px;
    border: 1px solid var(--navy-3);
    border-radius: 999px;
    background: var(--navy-2);
    color: #dcebf0;
    font-size: 13px;
    font-weight: 800;
  }
  .layout {
    display: grid;
    grid-template-columns: minmax(320px, 420px) minmax(0, 1fr);
    align-items: start;
    gap: 24px;
  }
  .sticky { position: sticky; top: 18px; }
  .selected-head {
    min-height: 38px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 9px;
  }
  .selected-head strong { font-size: 17px; }
  .selected-head span { color: var(--muted); font-size: 12px; }
  .board-shell {
    width: 100%;
    overflow: hidden;
    border-radius: 10px 10px 0 0;
    background: var(--paper);
    box-shadow: 0 14px 38px rgba(0,0,0,.4);
  }
  .wordbar {
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 12px;
    border-bottom: 1px solid #ddd3c7;
    background: var(--wordbar);
    color: #73808a;
    font-size: 13px;
  }
  .wordbar strong { margin-left: 8px; color: var(--ink); font-size: 17px; }
  .wordbar em { color: #cf4a1c; font-style: normal; font-weight: 900; }
  .board {
    position: relative;
    width: 100%;
    aspect-ratio: 1;
    overflow: hidden;
    background: var(--paper);
  }
  .board svg,
  .board .skin {
    position: absolute;
    inset: 0;
    display: block;
    width: 100%;
    height: 100%;
  }
  .board .skin { z-index: 2; pointer-events: none; object-fit: fill; }
  .nav {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 10px;
  }
  .nav button {
    min-height: 42px;
    border: 1px solid var(--navy-3);
    border-radius: 9px;
    background: var(--navy-2);
    color: #e6f1f4;
    font-weight: 800;
    cursor: pointer;
  }
  .nav button:hover { border-color: var(--teal); }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 11px;
  }
  .group-title {
    grid-column: 1 / -1;
    margin: 12px 0 -1px;
    color: #dcebf0;
    font-size: 15px;
  }
  .group-title:first-child { margin-top: 0; }
  .skin-card {
    min-width: 0;
    overflow: hidden;
    padding: 0;
    border: 2px solid transparent;
    border-radius: 10px;
    background: var(--navy-2);
    color: #eaf3f6;
    text-align: left;
    cursor: pointer;
  }
  .skin-card:hover { border-color: #557687; }
  .skin-card[aria-pressed="true"] {
    border-color: var(--orange);
    box-shadow: 0 0 0 2px rgba(243,97,42,.2);
  }
  .thumb {
    position: relative;
    display: block;
    width: 100%;
    aspect-ratio: 1;
    overflow: hidden;
    background: var(--paper);
  }
  .thumb svg,
  .thumb img {
    position: absolute;
    inset: 0;
    display: block;
    width: 100%;
    height: 100%;
  }
  .thumb img { z-index: 2; object-fit: fill; pointer-events: none; }
  .label {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
    padding: 8px 9px;
  }
  .label strong {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 12px;
  }
  .label small { flex: 0 0 auto; color: var(--muted); font-size: 10px; }
  @media (max-width: 860px) {
    .layout { grid-template-columns: 1fr; }
    .sticky { position: static; width: min(420px, 100%); margin: 0 auto; }
    .grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  }
  @media (max-width: 520px) {
    .page { width: min(100% - 24px, 420px); padding-top: 18px; }
    .top { align-items: flex-start; }
    .top p { max-width: 250px; }
    .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  }
</style>
</head>
<body>
<main class="page">
  <header class="top">
    <div>
      <h1>그림판 스킨 미리보기</h1>
      <p>유지 8종과 고레벨 보상 10종을 같은 그림·같은 크기로 비교합니다.</p>
    </div>
    <span id="skin-count" class="count">18종</span>
  </header>

  <div class="layout">
    <section class="sticky" aria-label="선택한 스킨 확대 미리보기">
      <div class="selected-head">
        <strong id="selected-name">색연필</strong>
        <span id="selected-index">1 / 18</span>
      </div>
      <div class="board-shell">
        <div class="wordbar">
          <span>제시어 <strong>고양이</strong></span>
          <em>41초&nbsp; 8명</em>
        </div>
        <div class="board">
          <svg class="sample-drawing" viewBox="0 0 720 720" aria-label="모든 스킨에 공통으로 표시되는 고양이 그림">
            <g fill="none" stroke-linecap="round" stroke-linejoin="round">
              <path d="M236 277L264 167L337 236M483 277L456 167L383 236" stroke="#dd7d24" stroke-width="11"/>
              <path d="M250 265C205 309 197 404 239 458C294 530 426 531 481 458C523 403 515 310 470 265C410 205 309 205 250 265Z" stroke="#dd7d24" stroke-width="11"/>
              <circle cx="313" cy="354" r="14" fill="#173746"/>
              <circle cx="407" cy="354" r="14" fill="#173746"/>
              <path d="M334 403L360 429L386 403" stroke="#173746" stroke-width="9"/>
              <path d="M292 520L322 458H399L428 520" stroke="#1b6fae" stroke-width="12"/>
              <path d="M94 586H626" stroke="#8ba7b3" stroke-width="7"/>
            </g>
          </svg>
          <img id="selected-skin" class="skin" src="assets/catchmind/board-frames/frame-color-pencil-v2.png" alt="">
        </div>
      </div>
      <div class="nav">
        <button id="prev-skin" type="button">이전 스킨</button>
        <button id="next-skin" type="button">다음 스킨</button>
      </div>
    </section>

    <section id="skin-grid" class="grid" aria-label="전체 그림판 스킨 목록"></section>
  </div>
</main>

<template id="skin-card-template">
  <button class="skin-card" type="button" aria-pressed="false">
    <span class="thumb">
      <svg viewBox="0 0 720 720" aria-hidden="true">
        <g fill="none" stroke-linecap="round" stroke-linejoin="round">
          <path d="M236 277L264 167L337 236M483 277L456 167L383 236" stroke="#dd7d24" stroke-width="13"/>
          <path d="M250 265C205 309 197 404 239 458C294 530 426 531 481 458C523 403 515 310 470 265C410 205 309 205 250 265Z" stroke="#dd7d24" stroke-width="13"/>
          <circle cx="313" cy="354" r="15" fill="#173746"/>
          <circle cx="407" cy="354" r="15" fill="#173746"/>
          <path d="M334 403L360 429L386 403" stroke="#173746" stroke-width="10"/>
        </g>
      </svg>
      <img alt="">
    </span>
    <span class="label"><strong></strong><small></small></span>
  </button>
</template>

<script>
  const skins = [
    { name: "색연필", group: "유지", src: "assets/catchmind/board-frames/frame-color-pencil-v2.png" },
    { name: "은하수", group: "유지", src: "assets/catchmind/board-frames/frame-galaxy-stars.png" },
    { name: "레트로 픽셀", group: "유지", src: "assets/catchmind/board-frames/frame-retro-pixel.png" },
    { name: "벚꽃", group: "유지", src: "assets/catchmind/board-frames/frame-cherry-blossom.png" },
    { name: "대나무", group: "유지", src: "assets/catchmind/board-frames/frame-bamboo-garden.png" },
    { name: "단청", group: "유지", src: "assets/catchmind/board-frames/frame-dancheong.png" },
    { name: "얼음 결정", group: "유지", src: "assets/catchmind/board-frames/frame-ice-crystal.png" },
    { name: "쿠키 스프링클", group: "유지", src: "assets/catchmind/board-frames/frame-cookie-sprinkle.png" },
    { name: "오로라 리본", group: "고레벨", src: "assets/catchmind/board-frames/frame-aurora-ribbon.png" },
    { name: "프리즘 글라스", group: "고레벨", src: "assets/catchmind/board-frames/frame-prism-glass.png" },
    { name: "레인보우 홀로그램", group: "고레벨", src: "assets/catchmind/board-frames/frame-rainbow-hologram.png" },
    { name: "마법 팔레트", group: "고레벨", src: "assets/catchmind/board-frames/frame-magic-palette.png" },
    { name: "골든 두들", group: "고레벨", src: "assets/catchmind/board-frames/frame-golden-doodle.png" },
    { name: "명작의 순간", group: "고레벨", src: "assets/catchmind/board-frames/frame-masterpiece.png" },
    { name: "별빛 구름", group: "고레벨", src: "assets/catchmind/board-frames/frame-starlight-cloud.png" },
    { name: "축제 리본", group: "고레벨", src: "assets/catchmind/board-frames/frame-celebration-ribbon.png" },
    { name: "캔디 보석", group: "고레벨", src: "assets/catchmind/board-frames/frame-gem-candy.png" },
    { name: "파스텔 카니발", group: "고레벨", src: "assets/catchmind/board-frames/frame-pastel-carnival.png" }
  ];

  const grid = document.getElementById("skin-grid");
  const template = document.getElementById("skin-card-template");
  const selectedImage = document.getElementById("selected-skin");
  const selectedName = document.getElementById("selected-name");
  const selectedIndex = document.getElementById("selected-index");
  let current = 0;

  function selectSkin(index) {
    current = (index + skins.length) % skins.length;
    const skin = skins[current];
    selectedImage.src = skin.src;
    selectedImage.alt = skin.name + " 그림판 스킨";
    selectedName.textContent = skin.name;
    selectedIndex.textContent = (current + 1) + " / " + skins.length;
    grid.querySelectorAll(".skin-card").forEach((card, cardIndex) => {
      card.setAttribute("aria-pressed", String(cardIndex === current));
    });
  }

  skins.forEach((skin, index) => {
    if (index === 0 || skins[index - 1].group !== skin.group) {
      const heading = document.createElement("h2");
      heading.className = "group-title";
      heading.textContent = skin.group === "유지" ? "유지 8종" : "고레벨 10종";
      grid.appendChild(heading);
    }
    const fragment = template.content.cloneNode(true);
    const card = fragment.querySelector(".skin-card");
    const image = fragment.querySelector("img");
    image.src = skin.src;
    image.alt = skin.name + " 그림판 스킨";
    fragment.querySelector("strong").textContent = skin.name;
    fragment.querySelector("small").textContent = skin.group;
    card.setAttribute("aria-label", skin.name + " 스킨 확대 보기");
    card.addEventListener("click", () => selectSkin(index));
    grid.appendChild(fragment);
  });

  document.getElementById("prev-skin").addEventListener("click", () => selectSkin(current - 1));
  document.getElementById("next-skin").addEventListener("click", () => selectSkin(current + 1));
  document.getElementById("skin-count").textContent = skins.length + "종";
  selectSkin(current);
</script>
</body>
</html>
